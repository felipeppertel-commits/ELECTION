name: Collect Election Data

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 */6 * * *"
  workflow_dispatch: # Manual trigger

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
  VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # Run collectors in parallel where possible
      - name: Fetch Google Trends
        run: npm run fetch:trends
        continue-on-error: true

      - name: Fetch Bluesky
        run: npm run fetch:bluesky
        continue-on-error: true

      - name: Fetch Google News
        run: npm run fetch:news
        continue-on-error: true

      - name: Fetch Polls
        run: npm run fetch:polls
        continue-on-error: true

      # Aggregation must run after all collectors
      - name: Compute Averages & Buzz Index
        run: npm run compute:averages

      # Notify on failure
      - name: Report Status
        if: failure()
        run: |
          echo "::warning::One or more collectors failed. Check logs."
